name: CI/CD — VJConsultancy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-check:
    name: Backend Install Check
    runs-on: gamma
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2.

      - name: Setup Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0.
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

  frontend-lint:
    name: Frontend Lint & Build Check
    runs-on: gamma
    needs: backend-check
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build check
        env:
          VITE_AUTH_URL: ${{ secrets.VITE_AUTH_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

  deploy:
    name: Build & Deploy Docker Containers
    runs-on: gamma
    needs: [backend-check, frontend-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify Docker is accessible
        run: docker --version && docker compose version

      - name: Create .env file
        run: |
          cat << EOF > .env
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          EOF

      - name: Force remove old containers
        run: |
          docker compose down --remove-orphans 2>/dev/null || true
          docker image prune -f

      - name: Build Docker images
        run: |
          docker compose build \
            --build-arg VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Start containers
        run: docker compose up -d

      - name: Show running containers
        run: docker compose ps

      - name: Clean up old images
        run: docker image prune -f
        continue-on-error: true